<!DOCTYPE html>

<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>لوحة ولي الأمر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="./assets/css/parent.css" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>
<body>
<div class="wrap">
<h1><i class="fas fa-people-roof"></i> لوحة ولي الأمر</h1>
<div class="card" id="login">
<p>ادخل بكود الطالب ورقم الهاتف المسجل.</p>
<input id="code" placeholder="كود الطالب"/>
<input id="phone" placeholder="رقم الهاتف / كلمة المرور"/>
<button class="btn" onclick="parentLogin()">دخول</button>
</div>
<div id="app" style="display:none">
<div class="card"><h2 id="student-name">--</h2><p id="student-level"></p></div>
<div class="grid">
<div class="kpi"><small>متوسط التقدم</small><br/><b id="avg-progress">0%</b></div>
<div class="kpi"><small>عدد الدروس المكتملة</small><br/><b id="done-lessons">0</b></div>
<div class="kpi"><small>الفواتير/المديونية</small><br/><b id="debt">0</b></div>
</div>
<div class="card"><h3>التقدم</h3><table><thead><tr><th>الدرس</th><th>النسبة</th></tr></thead><tbody id="progress-table"></tbody></table></div>
<div class="card"><h3>الدرجات</h3><table><thead><tr><th>الاختبار</th><th>الدرجة</th></tr></thead><tbody id="grades-table"></tbody></table></div>
<div class="card"><h3>الحضور</h3><table><thead><tr><th>الحصة</th><th>التاريخ</th></tr></thead><tbody id="attendance-table"></tbody></table></div>
</div>
</div>


<!-- ===== TITAN V16 FEATURES PACK: parent ===== -->


<script src="./assets/js/parent.js"></script></body></html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titan SaaS - Super Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;font-family:Cairo,sans-serif}body{margin:0;background:#0f172a;color:#f8fafc}.wrap{width:min(1120px,94vw);margin:auto;padding:28px}.card{background:#111c31;border:1px solid #26344f;border-radius:24px;padding:22px;margin:16px 0;box-shadow:0 18px 45px rgba(0,0,0,.25)}input,select{width:100%;padding:13px;border-radius:14px;border:1px solid #334155;background:#0b1220;color:#fff;margin:6px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}.btn{border:0;border-radius:14px;padding:12px 16px;font-weight:900;cursor:pointer;display:inline-flex;gap:8px;align-items:center;background:#2563eb;color:white;margin-top:8px}.btn.green{background:#10b981}.btn.red{background:#ef4444}.tenant{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:12px;border:1px solid #334155;border-radius:16px;background:#0b1220;margin:8px 0}a{color:#93c5fd}
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
<div class="wrap">
<h1><i class="fas fa-crown"></i> Titan SaaS Super Admin</h1>
<div class="card" id="login-box">
<h3>دخول مالك المنصة</h3>
<input id="email" type="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button class="btn" onclick="login()">دخول</button>
<p style="color:#94a3b8;line-height:1.8">لازم تضيف UID بتاعك يدويًا في <b>super_admins/UID = true</b> أول مرة.</p>
</div>
<div id="app" style="display:none">
<div class="card">
<h3>إنشاء أكاديمية جديدة</h3>
<div class="grid">
<input id="tenant-id" placeholder="tenant id مثال: titan">
<input id="tenant-name" placeholder="اسم الأكاديمية">
<input id="tenant-logo" placeholder="رابط اللوجو اختياري">
<input id="tenant-whatsapp" placeholder="رقم واتساب">
<select id="tenant-plan"><option value="free">Free</option><option value="basic">Basic</option><option value="pro">Pro</option><option value="enterprise">Enterprise</option></select>
<input id="tenant-admin-uid" placeholder="UID أدمن الأكاديمية">
</div>
<button class="btn green" onclick="createTenant()">إنشاء الأكاديمية</button>
<div id="status"></div>
</div>
<div class="card">
<h3>الأكاديميات</h3>
<div id="tenants-list"></div>
</div>
</div>
</div>
<script>

const firebaseConfig = {
  apiKey: "AIzaSyD-jPAgyJLJBeGZ5b32jFZ5eTIBx_AOgdY",
  authDomain: "programming-cc297.firebaseapp.com",
  databaseURL: "https://programming-cc297-default-rtdb.firebaseio.com",
  projectId: "programming-cc297",
  storageBucket: "programming-cc297.firebasestorage.app",
  messagingSenderId: "131761323515",
  appId: "1:131761323515:web:9a0b1f3fcb7e49ec9b91c4"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(), db=firebase.database();
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function status(msg){document.getElementById('status').innerHTML='<p style="color:#10b981;font-weight:900">'+esc(msg)+'</p>'}
async function login(){await auth.signInWithEmailAndPassword(email.value,pass.value); const uid=auth.currentUser.uid; const s=await db.ref('super_admins/'+uid).once('value'); if(!s.val()){alert('الحساب ليس Super Admin'); await auth.signOut(); return;} document.getElementById('login-box').style.display='none'; document.getElementById('app').style.display='block'; loadTenants();}
async function createTenant(){const id=document.getElementById('tenant-id').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g,''); if(!id)return alert('اكتب tenant id صحيح'); const adminUid=document.getElementById('tenant-admin-uid').value.trim(); const data={id,name:document.getElementById('tenant-name').value||id,logo:document.getElementById('tenant-logo').value||'',whatsapp:document.getElementById('tenant-whatsapp').value||'',primaryColor:'#2563eb',secondaryColor:'#7c3aed',createdAt:Date.now(),plan:document.getElementById('tenant-plan').value,status:'active',security:{singleDevice:false}}; await db.ref('tenants/'+id+'/settings').set(data); await db.ref('tenants/'+id+'/academy_subscription').set({plan:document.getElementById('tenant-plan').value,status:'active',createdAt:Date.now()}); await db.ref('public_tenants/'+id).set({name:data.name,status:'active'}); if(adminUid){await db.ref('tenants/'+id+'/admins/'+adminUid).set(true); await db.ref('user_tenants/'+adminUid+'/'+id).set('admin');} status('تم إنشاء الأكاديمية'); loadTenants();}
function loadTenants(){db.ref('tenants').on('value',snap=>{const all=snap.val()||{}; document.getElementById('tenants-list').innerHTML=Object.entries(all).map(([id,t])=>{const s=t.settings||{};return '<div class="tenant"><div><b>'+esc(s.name||id)+'</b><br><small>'+esc(id)+' | '+esc((t.academy_subscription&&t.academy_subscription.plan)||'-')+'</small></div><div><a href="admin_secure_live_classroom_v14_saas.html?tenant='+encodeURIComponent(id)+'" target="_blank">Admin</a> | <a href="student_secure_live_classroom_v14_saas.html?tenant='+encodeURIComponent(id)+'" target="_blank">Student</a></div></div>'}).join('')})}
</script>
</body></html>

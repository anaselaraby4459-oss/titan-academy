<style id="merged-uiux-css">
/* Inlined from assets/css/uiux.css */
/* ===== TITAN UI/UX POLISH PACK =====
   Adds smoother transitions, better responsive behavior, modern cards, persisted dark mode, and dashboard chart layouts.
*/
:root{
  --primary-gradient: linear-gradient(135deg, var(--primary,#2563eb), #7c3aed);
  --uiux-surface: rgba(255,255,255,.78);
  --uiux-glass: rgba(255,255,255,.68);
  --uiux-overlay: rgba(15,23,42,.55);
  --uiux-ring: rgba(37,99,235,.16);
  --uiux-ease: cubic-bezier(.2,.8,.2,1);
  --uiux-shadow: 0 18px 48px rgba(15,23,42,.10);
  --uiux-shadow-hover: 0 22px 60px rgba(15,23,42,.16);
}
html[data-theme="dark"], body[data-theme="dark"], [data-theme="dark"]{
  --uiux-surface: rgba(18,28,47,.78);
  --uiux-glass: rgba(18,28,47,.66);
  --uiux-overlay: rgba(2,6,23,.72);
  --uiux-ring: rgba(96,165,250,.18);
  --uiux-shadow: 0 18px 55px rgba(0,0,0,.38);
  --uiux-shadow-hover: 0 26px 70px rgba(0,0,0,.46);
}
html{scroll-behavior:smooth;}
body{
  transition: background-color .28s var(--uiux-ease), color .28s var(--uiux-ease);
  background-image:
    radial-gradient(circle at 10% 10%, rgba(37,99,235,.08), transparent 30%),
    radial-gradient(circle at 90% 15%, rgba(124,58,237,.08), transparent 28%) !important;
  background-attachment: fixed;
}
*{transition-timing-function:var(--uiux-ease) !important;}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;scroll-behavior:auto !important;transition-duration:.01ms !important;}
}
.card,.panel,.stat-card,.lesson-card,.exam-paper,.login-card,.chat-container,#portfolio-content,.kpi,.feature,.v16-card,.v15-card,.v14-card,.v13-card,.v10-card,.v9-kpi{
  position:relative;
  box-shadow:var(--uiux-shadow) !important;
  transform:translateY(0);
  transition: transform .22s var(--uiux-ease), box-shadow .22s var(--uiux-ease), border-color .22s var(--uiux-ease), background-color .22s var(--uiux-ease) !important;
}
.card:hover,.panel:hover,.stat-card:hover,.lesson-card:hover,.feature:hover,.v16-card:hover,.v15-card:hover,.v14-card:hover,.v13-card:hover,.v10-card:hover,.v9-kpi:hover{
  transform:translateY(-3px) !important;
  box-shadow:var(--uiux-shadow-hover) !important;
}
.btn,.icon-btn,.student-menu-btn,.nav-link,.btn-outline,.v15-tab{
  transition: transform .18s var(--uiux-ease), box-shadow .18s var(--uiux-ease), background-color .18s var(--uiux-ease), color .18s var(--uiux-ease), border-color .18s var(--uiux-ease) !important;
}
.btn:hover,.icon-btn:hover,.student-menu-btn:hover,.v15-tab:hover{transform:translateY(-2px) !important;}
.nav-link:hover,.btn-outline:hover{transform:translateX(-4px) !important;}
input,select,textarea{
  transition: border-color .18s var(--uiux-ease), box-shadow .18s var(--uiux-ease), background-color .18s var(--uiux-ease) !important;
}
input:focus,select:focus,textarea:focus{
  outline:none !important;
  box-shadow:0 0 0 4px var(--uiux-ring) !important;
}
header,.sidebar,.login-box,.login-card,.card,.panel,.chat-container{
  backdrop-filter: blur(14px);
}
header.no-print, header{
  background:var(--uiux-glass) !important;
}
.sidebar{
  background:var(--uiux-glass) !important;
}
.custom-toast,.v10-toast{
  animation:uiuxToast .28s var(--uiux-ease) both !important;
}
@keyframes uiuxToast{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
section,.app-section,.uiux-reveal{
  animation:uiuxFadeUp .34s var(--uiux-ease) both;
}
@keyframes uiuxFadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.uiux-table-wrap{width:100%;overflow-x:auto;border-radius:16px;}
.uiux-table-wrap table{min-width:720px;margin-top:0;}
.uiux-dashboard-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(220px,1fr));
  gap:18px;
  margin-top:20px;
}
.uiux-chart-card{min-height:310px;overflow:hidden;}
.uiux-chart-card canvas{width:100% !important;max-height:230px !important;}
.uiux-dashboard-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.uiux-badge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  border:1px solid rgba(37,99,235,.22);
  background:rgba(37,99,235,.09);
  color:var(--primary,#2563eb);
  border-radius:999px;
  padding:6px 11px;
  font-size:.82rem;
  font-weight:900;
}
.uiux-theme-fab{
  position:fixed;
  left:18px;
  bottom:18px;
  z-index:99999;
  width:52px;
  height:52px;
  border:0;
  border-radius:18px;
  background:var(--primary-gradient,linear-gradient(135deg,#2563eb,#7c3aed));
  color:#fff;
  box-shadow:0 18px 38px rgba(37,99,235,.25);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.15rem;
}
.uiux-theme-fab:hover{transform:translateY(-3px) scale(1.02) !important;}
.uiux-progress-card{display:grid;grid-template-columns:120px 1fr;gap:16px;align-items:center;}
.uiux-ring-progress{--pct:0; width:112px;height:112px;border-radius:50%;background:conic-gradient(var(--primary,#2563eb) calc(var(--pct)*1%), rgba(148,163,184,.22) 0);display:grid;place-items:center;}
.uiux-ring-progress span{width:78px;height:78px;border-radius:50%;background:var(--card-bg,var(--bg-card,#fff));display:grid;place-items:center;font-weight:900;font-size:1.35rem;color:var(--primary,#2563eb);}
[data-theme="dark"] .uiux-ring-progress span, html[data-theme="dark"] .uiux-ring-progress span{background:var(--card-bg,var(--bg-card,#121c2f));}
@media (max-width:1100px){
  .uiux-dashboard-grid{grid-template-columns:1fr 1fr;}
  .vc-shell{grid-template-columns:1fr !important;}
}
@media (max-width:900px){
  body{background-attachment:scroll;}
  header.no-print, header{position:sticky !important;top:0 !important;z-index:90 !important;border-radius:0 0 22px 22px !important;}
  .main-content{padding:1rem !important;}
  .stats-grid,[style*="grid-template-columns: repeat(auto-fit"],.v16-grid,.v15-grid,.v14-grid,.v13-grid,.v10-grid{gap:12px !important;}
  .card,.panel,.stat-card{border-radius:18px !important;padding:1rem !important;}
}
@media (max-width:680px){
  .uiux-dashboard-grid{grid-template-columns:1fr;}
  .uiux-progress-card{grid-template-columns:1fr;text-align:center;}
  .uiux-ring-progress{margin:auto;}
  .btn{width:100%;justify-content:center;}
  .header-actions{width:100%;justify-content:space-between;}
  table{font-size:.86rem;}
  td,th{padding:10px !important;}
  .uiux-theme-fab{width:48px;height:48px;left:12px;bottom:12px;border-radius:16px;}
}
@media (max-width:420px){
  h1,#page-title{font-size:1.25rem !important;}
  h2{font-size:1.1rem !important;}
  .stat-value{font-size:2.2rem !important;}
}


/* ===== FIX: stable financial growth chart ===== */
#mainChart{
  display:block !important;
  width:100% !important;
  height:280px !important;
  min-height:280px !important;
  max-height:280px !important;
}
#mainChart + .chartjs-size-monitor,
.uiux-chart-card canvas{
  min-height:220px !important;
}
#sec-dash > div:nth-of-type(2) > .card:first-child{
  min-height:360px;
  overflow:hidden;
}
@media(max-width:900px){
  #sec-dash > div:nth-of-type(2){
    grid-template-columns:1fr !important;
  }
  #mainChart{
    height:240px !important;
    min-height:240px !important;
    max-height:240px !important;
  }
}


/* ===== TITAN LIVE PRO PACK ===== */
.v19-live-tools{

  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));

@media(max-width:700px){.v19-live-tools{grid-template-columns:1fr}.v19-rec-timer{font-size:1.05rem}.v19-replay-grid{grid-template-columns:1fr}}

</style>

function generateReminders(){var students=window.db_students||[], invoices=window.db_invoices||[], nowMs=Date.now(); var reminders=[]; students.forEach(function(s){var uid=s.fbKey||s.key; var name=s.name||s.code||uid; var last=0; try{var act=(window.db_student_activity||{})[uid]; last=act&&Date.parse(act.lastSeen||act.createdAt||0)||0;}catch(e){} if(!last) reminders.push({type:'no_activity',studentKey:uid,name:name,phone:s.phone||'',level:s.level||'',message:'لا يوجد نشاط حديث مسجل للطالب.'}); else if(nowMs-last>3*24*60*60*1000) reminders.push({type:'inactive_3d',studentKey:uid,name:name,phone:s.phone||'',level:s.level||'',message:'الطالب لم يدخل منذ أكثر من 3 أيام.'}); var debt=invoices.filter(function(iv){return (iv.studentKey===uid)||(iv.name===s.name);}).reduce(function(a,iv){return a+Number(iv.remaining||iv.debt||0)},0); if(debt>0) reminders.push({type:'debt',studentKey:uid,name:name,phone:s.phone||'',level:s.level||'',message:'يوجد مبلغ متبقي: '+debt}); var sub=s.subscription||{}; if(sub.endDate){var end=Date.parse(sub.endDate); if(end&&!isNaN(end)&&end-nowMs<5*24*60*60*1000) reminders.push({type:'subscription',studentKey:uid,name:name,phone:s.phone||'',level:s.level||'',message:'الاشتراك قرب ينتهي أو منتهي.'}); }}); $('v20-kpi-reminders')&&($('v20-kpi-reminders').textContent=reminders.length); var box=$('v20-reminders-list'); if(box){box.innerHTML=reminders.length?'<div class="v20-table-wrap"><table class="v20-table"><thead><tr><th>الطالب</th><th>النوع</th><th>التنبيه</th><th>إجراء</th></tr></thead><tbody>'+reminders.map(function(r){var msg=encodeURIComponent('تنبيه من الأكاديمية: '+r.message+' - '+r.name); var wa=r.phone?'<a class="v20-btn green" target="_blank" href="https://wa.me/'+String(r.phone).replace(/\D/g,'')+'?text='+msg+'"><i class="fab fa-whatsapp"></i> واتساب</a>':''; return '<tr><td>'+esc(r.name)+'</td><td>'+esc(r.type)+'</td><td>'+esc(r.message)+'</td><td>'+wa+'</td></tr>';}).join('')+'</tbody></table></div>':'<div class="v20-empty">لا توجد تنب function printCertificate(id){
  var el=$(id);
  if(!el) return;
  var w=window.open('','_blank');
  if(!w) return alert('المتصفح منع نافذة الطباعة');
  var body = el.outerHTML || '';
  var doc = [
    '<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8">',
    '<meta name="viewport" content="width=device-width,initial-scale=1">',
    '<title>Certificate</title>',
    '<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">',
    '<style>',
    'body{font-family:Cairo,Arial,sans-serif;background:#fff;color:#0f172a;margin:0;padding:24px;line-height:1.8;text-align:center}',
    '.v20-cert,.certificate,.card{max-width:900px;margin:auto;border:2px solid #2563eb;border-radius:24px;padding:30px;box-shadow:0 12px 35px rgba(15,23,42,.10)}',
    '.v20-cert-name{font-size:2rem;font-weight:900;color:#2563eb;margin:12px 0}',
    'h1,h2,h3{color:#2563eb}',
    'img{max-width:160px}',
    'button,a{display:none!important}',
    '@media print{body{padding:0}.v20-cert,.certificate,.card{box-shadow:none}}',
    '</style>',
    '</head><body>',
    body,
    '<script>setTimeout(function(){window.print();},500);<' + '/script>',
    '</' + 'body></' + 'html>'
  ].join('');
  w.document.open();
  w.document.write(doc);
  w.document.close();
}

function wrapExamPro(){ if(window.openExam && !window.openExam.__v20){var oldOpen=window.openExam; window.openExam=function(examKey){var res=oldOpen.apply(this,arguments); examState.key=examKey; setTimeout(startExamPro,200); logTimeline('exam_open',examKey); return res;}; window.openExam.__v20=true;} if(window.closeExam && !window.closeExam.__v20){var oldClose=window.closeExam; window.closeExam=function(){stopExamPro(); return oldClose.apply(this,arguments);}; window.closeExam.__v20=true;} if(window.submitExam && !window.submitExam.__v20){var oldSubmit=window.submitExam; window.submitExam=async function(){await saveExamAutosave(true); var res=await oldSubmit.apply(this,arguments); logTimeline('exam_submit',examState.key||''); stopExamPro(); return res;}; window.submitExam.__v20=true;}}
function startExamPro(){var area=$('exam-take-area'); if(!area||!examState.key) return; if(!$('v20-exam-bar')) area.insertAdjacentHTML('afterbegin','<div class="v20-exam-bar" id="v20-exam-bar"><span><i class="fas fa-shield"></i> Exam Pro: حفظ تلقائي + عداد وقت</span><span class="time" id="v20-exam-time">30:00</span></div>'); var exam=window.allExams&&window.allExams[examState.key]||{}; examState.remain=Number(exam.durationMinutes||exam.duration||30)*60; clearInterval(examState.timer); examState.timer=setInterval(function(){examState.remain--; var m=Math.floor(examState.remain/60),s=examState.remain%60; $('v20-exam-time')&&($('v20-exam-time').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')); if(examState.remain<=0){clearInterval(examState.timer); alert('انتهى وقت الامتحان، سيتم التسليم الآن.'); if(window.submitExam) window.submitExam();}},1000); clearInterval(examState.autosave); examState.autosave=setInterval(saveExamAutosave,5000); q('#exam-questions-area')&&q('#exam-questions-area').addEventListener('change',function(){saveExamAutosave(false);},{once:false});}
function stopExamPro(){clearInterval(examState.timer); clearInterval(examState.autosave); examState.key=null; var b=$('v20-exam-bar'); if(b)b.remove();}
function saveExamAutosave(finalSave){var u=user(); if(!u||!examState.key) return Promise.resolve(); var answers={}; qa('#exam-questions-area input[type="radio"]:checked').forEach(function(inp){answers[inp.name]=inp.value;}); return update('exam_autosaves/'+u.uid+'/'+examState.key,{answers:answers,final:!!finalSave,remainingSeconds:examState.remain,updatedAt:now(),when:ar()});}

function initParent(){ var app=$('app'); if(!app || $('v20-parent-card')) return; var div=document.createElement('div'); div.id='v20-parent-card'; div.className='card'; div.innerHTML='<h3><i class="fas fa-clock-rotate-left"></i> متابعة ولي الأمر</h3><div id="v20-parent-timeline" class="v20-timeline"><div class="v20-empty">سيظهر نشاط الطالب بعد تسجيل الدخول.</div></div><div id="v20-parent-certs"></div>'; app.appendChild(div); var old=window.loadParentData; if(typeof old==='function'&&!old.__v20){window.loadParentData=async function(){var r=await old.apply(this,arguments); setTimeout(loadParentV20,700); return r;}; window.loadParentData.__v20=true;} setTimeout(loadParentV20,1500);}
function loadParentV20(){var u=user(); if(!u) return; once('student_timeline/'+u.uid).then(function(data){renderTimelineInto('v20-parent-timeline',arr(data).sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0)}).slice(0,20));}); once('certificates/'+u.uid).then(function(data){var list=arr(data).sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0)}); var el=$('v20-parent-certs'); if(el) el.innerHTML=list.length?'<h3>الشهادات</h3>'+list.map(certCard).join(''):'<div class="v20-empty">لا توجد شهادات بعد.</div>';});}

function ready(fn){if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',fn); else fn();}
ready(function(){var t=pageType(); if(t==='admin') initAdmin(); if(t==='student') initStudent(); if(t==='parent') initParent(); setTimeout(function(){ if(pageType()==='admin') initAdmin(); if(pageType()==='student') initStudent(); if(pageType()==='parent') initParent(); },1200);});

<script id="titan-v21-parent-growth-js">
(function(){
'use strict';
if(window.TitanV21Parent) return;
function $(id){return document.getElementById(id)}
function db(){try{return window.firebase&&firebase.database&&firebase.database()}catch(e){return null}}
function auth(){try{return window.firebase&&firebase.auth&&firebase.auth()}catch(e){return null}}
function user(){try{return auth()&&auth().currentUser}catch(e){return null}}
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function now(){return Date.now()} function ar(){try{return new Date().toLocaleString('ar-EG')}catch(e){return new Date().toISOString()}}
async function once(path){const d=db(); if(!d) return null; const s=await d.ref(path).once('value'); return s.val()}
async function push(path,data){const d=db(); if(!d) throw new Error('db not ready'); return d.ref(path).push(data)}
async function set(path,data){const d=db(); if(!d) throw new Error('db not ready'); return d.ref(path).set(data)}

async function loadAnn(){const data=await once('growth_announcements')||{}; if($('v21-parent-ann')) $('v21-parent-ann').innerHTML=Object.values(data).filter(a=>a.active!==false).slice(-3).reverse().map(a=>'<div class="v21-file-card"><div><b>'+esc(a.title)+'</b><div class="v21-muted">'+esc(a.body||'')+'</div></div></div>').join('')}
function chatId(){const u=user(); return u?'parent_'+u.uid:'parent_guest'}
async function loadChat(){const id=chatId(); const c=await once('private_chats/'+id)||{}; const msgs=c.messages||{}; if($('v21-parent-chat')) {$('v21-parent-chat').innerHTML=Object.values(msgs).sort((a,b)=>(a.at||0)-(b.at||0)).map(m=>'<div class="v21-msg '+(m.fromRole==='parent'?'mine':'other')+'"><b>'+esc(m.fromRole==='parent'?'أنت':'الإدارة')+'</b><br>'+esc(m.text)+'<small>'+esc(m.when||'')+'</small></div>').join('')||'<div class="v21-empty">ابدأ محادثة مع الإدارة.</div>'; $('v21-parent-chat').scrollTop=$('v21-parent-chat').scrollHeight}}
async function send(){const u=user(); if(!u) return alert('سجل الدخول أولاً'); const text=($('v21-parent-msg')&&$('v21-parent-msg').value||'').trim(); if(!text) return; const id=chatId(); await set('private_chats/'+id+'/participants/'+u.uid,true); await set('private_chats/'+id+'/studentName','ولي أمر'); await push('private_chats/'+id+'/messages',{text,from:u.uid,fromRole:'parent',at:now(),when:ar()}); await set('private_chats/'+id+'/lastMessage',text); await set('private_chats/'+id+'/updatedAt',now()); $('v21-parent-msg').value=''; loadChat()}
window.TitanV21Parent={load,send};
document.addEventListener('DOMContentLoaded',function(){setTimeout(inject,1200);setTimeout(inject,3000)});
})();
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية تيتان - المنظومة المتكاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* تنسيق شاشة الاختيار الأولية */
        #role-selection {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
            font-family: 'Cairo', sans-serif;
        }

        .role-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .role-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            width: 200px;
            transition: 0.3s;
        }

        .role-card:hover {
            border-color: #6366f1;
            transform: translateY(-10px);
            background: #2d3a4f;
        }

        .role-card i {
            font-size: 3rem;
            color: #6366f1;
            margin-bottom: 15px;
        }

        /* إخفاء الأقسام افتراضياً */
        #teacher-portal, #student-portal {
            display: none;
        }

        /* استيراد تنسيقات موقع المعلم (index.html) */
        /* [تم دمج تنسيقات المعلم هنا] */
        :root {
            --primary: #4f46e5; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg-body: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9;
            --text-dim: #94a3b8; --border: rgba(255, 255, 255, 0.1);
        }
        /* ... باقي تنسيقات المعلم ... */
    </style>

    </head>
<body>

    <div id="role-selection">
        <i class="fas fa-rocket" style="font-size: 4rem; color: #6366f1; margin-bottom: 20px;"></i>
        <h1>مرحباً بك في أكاديمية تيتان</h1>
        <p>يرجى اختيار نوع الحساب للدخول</p>
        <div class="role-container">
            <div class="role-card" onclick="selectRole('teacher')">
                <i class="fas fa-user-tie"></i>
                <h3>معلم / أدمن</h3>
            </div>
            <div class="role-card" onclick="selectRole('student')">
                <i class="fas fa-user-graduate"></i>
                <h3>طالب</h3>
            </div>
        </div>
    </div>

    <div id="teacher-portal">
        <iframe src="index.html" style="width: 100%; height: 100vh; border: none;"></iframe>
    </div>

    <div id="student-portal">
        <iframe src="index (1).html" style="width: 100%; height: 100vh; border: none;"></iframe>
    </div>

    <script>
        function selectRole(role) {
            const selectionScreen = document.getElementById('role-selection');
            const teacherPortal = document.getElementById('teacher-portal');
            const studentPortal = document.getElementById('student-portal');

            selectionScreen.style.display = 'none';

            if (role === 'teacher') {
                teacherPortal.style.display = 'block';
            } else {
                studentPortal.style.display = 'block';
            }
        }
    </script>
</body>
</html>


<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية تيتان - اختيار الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            margin: 0; padding: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Cairo', sans-serif; color: var(--text);
        }
        .container {
            text-align: center; background: var(--card); padding: 3rem;
            border-radius: 30px; border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 500px;
        }
        .logo i { font-size: 4rem; color: var(--primary); margin-bottom: 20px; }
        h1 { color: var(--text); margin-bottom: 10px; font-weight: 800; }
        .roles { display: flex; gap: 20px; margin-top: 30px; }
        .role-card {
            flex: 1; background: #f1f5f9; padding: 25px; border-radius: 20px;
            text-decoration: none; color: var(--text); transition: 0.3s;
            border: 2px solid transparent;
        }
        .role-card:hover {
            transform: translateY(-5px); background: #ffffff;
            border-color: var(--primary); box-shadow: 0 5px 15px rgba(79, 70, 229, 0.1);
        }
        .role-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 15px; display: block; }
        .role-card h3 { margin: 0; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><i class="fas fa-rocket"></i></div>
        <h1>أكاديمية تيتان</h1>
        <p>مرحباً بك، يرجى اختيار نوع الحساب</p>
        <div class="roles">
            <a href="admin.html" class="role-card">
                <i class="fas fa-user-shield"></i>
                <h3>المعلم</h3>
            </a>
            <a href="student.html" class="role-card">
                <i class="fas fa-user-graduate"></i>
                <h3>الطالب</h3>
            </a>
        </div>
    </div>
</body>
</html>
